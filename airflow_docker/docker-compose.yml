# ============================================================================
# CONFIGURATION COMMUNE
# ============================================================================
x-airflow-common:
  &airflow-common
  image: apache/airflow:3.1.5

  environment:
    &airflow-common-env

    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__DEFAULT_TIMEZONE: 'Europe/Paris'

    # Base metadata Airflow
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-metadata/metadonne

    # API auth (Simple auth manager)
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
    AIRFLOW__AUTH__BACKEND: airflow.auth.managers.simple.SimpleAuthManager
    AIRFLOW__AUTH__USER: innocent
    AIRFLOW__AUTH__PASSWORD: INNOce55555

    # Webserver
    AIRFLOW__WEBSERVER__SECRET_KEY: ''
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'

    # Scheduler
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL: '30'

    # Connexion base métier
    AIRFLOW_CONN_DATA_POSTGRES: postgresql://datauser:datapass@postgres-data:5432/meteo_api

  volumes:
    - ${AIRFLOW_PROJ_DIR:-.}/dags:/opt/airflow/dags
    - ${AIRFLOW_PROJ_DIR:-.}/logs:/opt/airflow/logs
    - ${AIRFLOW_PROJ_DIR:-.}/plugins:/opt/airflow/plugins

  user: "50000:0"

  depends_on:
    &airflow-common-depends-on
    postgres-metadata:
      condition: service_healthy
    postgres-data:
      condition: service_healthy

# ============================================================================
# SERVICES
# ============================================================================
services:

  # --------------------------------------------------------------------------
  # BASE METADATA AIRFLOW
  # --------------------------------------------------------------------------
  postgres-metadata:
    image: postgres:15
    container_name: airflow-metadata-db

    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: metadonne
      PGDATA: /var/lib/postgresql/data/pgdata

    volumes:
      - postgres-metadata-volume:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s

    restart: always

    ports:
      - "5432:5432"

  # --------------------------------------------------------------------------
  # BASE MÉTIER
  # --------------------------------------------------------------------------
  postgres-data:
    image: postgres:15
    container_name: airflow-data-db

    environment:
      POSTGRES_USER: datauser
      POSTGRES_PASSWORD: datapass
      POSTGRES_DB: meteo_api
      PGDATA: /var/lib/postgresql/data/pgdata

    volumes:
      - postgres-data-volume:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD", "pg_isready", "-U", "datauser"]
      interval: 10s
      retries: 5
      start_period: 5s

    restart: always

    ports:
      - "5433:5432"

  # --------------------------------------------------------------------------
  # INITIALISATION AIRFLOW
  # --------------------------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    container_name: airflow-init
    
    user: "0:0"

    command:
      - -c
      - |
        # Installer netcat si nécessaire
        apt-get update > /dev/null 2>&1 && apt-get install -y netcat-traditional > /dev/null 2>&1 || true
        
        # Attendre les bases de données
        echo "⏳ Attente de la base metadata..."
        while ! nc -z postgres-metadata 5432; do sleep 1; done
        echo "✅ Base metadata prête!"
        
        echo "⏳ Attente de la base métier..."
        while ! nc -z postgres-data 5432; do sleep 1; done
        echo "✅ Base métier prête!"

        # Créer les dossiers avec les bonnes permissions
        mkdir -p /opt/airflow/dags /opt/airflow/logs /opt/airflow/plugins
        chown -R 50000:0 /opt/airflow/dags /opt/airflow/logs /opt/airflow/plugins
        chmod -R 775 /opt/airflow/dags /opt/airflow/logs /opt/airflow/plugins

        # Migration DB Airflow
        echo "🗃️ Migration DB Airflow..."
        su -s /bin/bash airflow -c "airflow db migrate"

        echo "✅ Initialisation terminée!"
        su -s /bin/bash airflow -c "airflow version"

    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'

    restart: on-failure

  # --------------------------------------------------------------------------
  # WEBSERVER (API SERVER PRINCIPAL)
  # --------------------------------------------------------------------------
  airflow-webserver:
    <<: *airflow-common
    command: api-server
    container_name: airflow-webserver

    ports:
      - "8080:8080"

    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

    restart: always

    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # --------------------------------------------------------------------------
  # SCHEDULER
  # --------------------------------------------------------------------------
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    container_name: airflow-scheduler

    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

    restart: always

    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # --------------------------------------------------------------------------
  # API SERVER (SECONDARY)
  # --------------------------------------------------------------------------
  airflow-api-server:
    <<: *airflow-common
    command: api-server
    container_name: airflow-api-server

    environment:
      <<: *airflow-common-env
      AIRFLOW__WEBSERVER__WEB_SERVER_WORKER_TIMEOUT: '300'

    ports:
      - "8081:8080"

    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

    restart: always

    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # --------------------------------------------------------------------------
  # TRIGGERER
  # --------------------------------------------------------------------------
  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    container_name: airflow-triggerer

    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

    restart: always

    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

# ============================================================================
# VOLUMES
# ============================================================================
volumes:
  postgres-metadata-volume:
  postgres-data-volume:

# ============================================================================
# RÉSEAU
# ============================================================================
networks:
  default:
    name: airflow-network
    driver: bridge
